<!-- FashionDex/index.html - GitHub Pages static build -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cappuccino Fashion FashionDex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260630-dishdex-style-v1">
</head>
<body class="dark-theme">
  <main class="page app-shell">
    <header class="topbar panel chrome-panel">
      <button class="brand" data-route="home" aria-label="FashionDex Home">
        <span class="brand-mark">✂️</span>
        <span><strong>FashionDex</strong><small>Goodgame Fashion helper</small></span>
      </button>
      <nav class="topnav" aria-label="Main navigation">
        <button data-route="mydex">MyDex</button>
        <button data-route="full">Full FashionDex</button>
        <button data-route="time">My Time</button>
        <button data-route="coop">Co-Op Planner</button>
        <button data-route="profile">My Profile</button>
        <button data-route="labels">My Labels</button>
      </nav>
      <div class="toolbar home-controls">
        <button id="refreshData" class="action-button" title="Reload XML data">Reload</button>
        <button id="themeToggle" class="action-button">Dark Theme</button>
      </div>
    </header>

    <main id="app" class="view">
      <section class="panel loading-card">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Loading FashionDex…</h1>
        <p>Reading <code>FashionItems.xml</code>, <code>FashionLevelXp.xml</code>, and <code>langs/Fashion_en.xml</code> from this GitHub Pages repo.</p>
      </section>
    </main>
  </main>
  <script src="app.js?v=20260630-dishdex-style-v1"></script>
</body>
</html>
